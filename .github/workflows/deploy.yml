name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::828007040661:role/ec2-github
          aws-region: ca-central-1
      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-0e4757a759e2a9991 \
            --document-name AWS-RunShellScript \
            --parameters 'commands=["/usr/local/bin/deploy /var/www/piroir/htdocs/wp-content/plugins/umt-studio"]' \
            --query Command.CommandId --output text)
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id i-0e4757a759e2a9991
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id i-0e4757a759e2a9991 \
            --query '[StatusDetails,StandardOutputContent,StandardErrorContent]' \
            --output text
